<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automatisierungs-Potenzialanalyse | AI Improve</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0a0f1e,#121b35,#0d1527);color:#e8ecf4;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
html{scroll-behavior:smooth}
#app{min-height:100vh}
.pbar{position:sticky;top:0;z-index:50;background:rgba(10,15,30,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(100,140,255,.1)}
.pbar-in{max-width:760px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:16px}
.plbl{font-family:monospace;font-size:11px;color:#648cff;white-space:nowrap}
.ptrk{flex:1;height:4px;background:rgba(100,140,255,.12);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#648cff,#a78bfa);border-radius:2px;transition:width .5s ease}
.ctr{max-width:760px;margin:0 auto;padding:32px 24px 80px}
.bp{background:linear-gradient(135deg,#648cff,#a78bfa);color:#fff;border:none;border-radius:10px;padding:14px 48px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 24px rgba(100,140,255,.3);transition:transform .15s,box-shadow .15s}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(100,140,255,.4)}
.bs{padding:12px 28px;border-radius:10px;border:1px solid rgba(100,140,255,.2);background:transparent;color:#648cff;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .2s}
.bs:hover{background:rgba(100,140,255,.08)}
.inp{width:100%;background:rgba(0,0,0,.25);border:1px solid rgba(100,140,255,.1);border-radius:8px;padding:10px 14px;color:#e8ecf4;font-size:14px;font-family:inherit;outline:0;transition:border-color .2s}
.inp:focus{border-color:rgba(100,140,255,.35)}
textarea.inp{resize:vertical;line-height:1.6;min-height:70px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:32px}
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid rgba(100,140,255,.1);background:rgba(100,140,255,.04);color:#5a6478;transition:all .2s}
.pill.on{border-color:#648cff;background:rgba(100,140,255,.15);color:#a78bfa}
.qc{background:rgba(100,140,255,.04);border:1px solid rgba(100,140,255,.08);border-radius:14px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.qc.open{border-color:rgba(100,140,255,.2)}
.qc-head{padding:16px 24px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;user-select:none}
.qc-head:hover{background:rgba(100,140,255,.03)}
.ql{font-size:15px;font-weight:600;line-height:1.5;flex:1}
.qc-arrow{font-size:18px;color:#648cff;transition:transform .25s ease;flex-shrink:0}
.qc.open .qc-arrow{transform:rotate(180deg)}
.qc-badge{font-size:11px;font-family:monospace;color:#a78bfa;background:rgba(167,139,250,.12);padding:2px 8px;border-radius:10px;flex-shrink:0}
.qc-body{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;padding:0 24px}
.qc.open .qc-body{max-height:800px;padding:0 24px 20px}
.qh{font-size:13px;color:#6b7689;margin-bottom:12px;font-style:italic}
.mt{padding:8px 16px;border-radius:20px;border:1px solid rgba(100,140,255,.12);background:rgba(0,0,0,.15);color:#8892a8;font-size:13px;cursor:pointer;font-family:inherit;display:inline-block;margin:0 6px 8px 0;transition:all .15s}.mt:hover{border-color:rgba(255,255,255,.6);color:#e8ecf4;background:rgba(255,255,255,.06)}
.mt.on{border-color:#648cff;background:rgba(100,140,255,.15);color:#a78bfa;font-weight:600}
.sonst{margin-top:10px}.sonst-lbl{font-size:12px;color:#6b7689;margin-bottom:4px;font-style:italic;display:block}
.rg{display:grid;grid-template-columns:1fr repeat(5,36px) 36px;gap:4px;align-items:center;margin-bottom:6px}
.rb{width:32px;height:32px;border-radius:50%;border:1px solid rgba(100,140,255,.15);background:rgba(0,0,0,.2);color:#5a6478;font-size:13px;font-weight:600;cursor:pointer;font-family:monospace;display:flex;align-items:center;justify-content:center;margin:0 auto;padding:0;transition:all .15s}
.rb.on{border:2px solid #648cff;color:#a78bfa}
.hero{display:flex;align-items:center;justify-content:center;gap:28px;margin-bottom:16px;flex-wrap:wrap}
.hero h1{font-size:34px;font-weight:700;line-height:1.2;background:linear-gradient(135deg,#e8ecf4,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:left}
.hero-logo{height:90px;flex-shrink:0}
.sec-head{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.sec-icon{font-size:36px;flex-shrink:0}
.sec-head h2{font-size:28px;font-weight:700;flex:1}
.sec-logo{height:36px;flex-shrink:0;opacity:.7}
.sc{background:rgba(100,140,255,.06);border:1px solid rgba(100,140,255,.12);border-radius:10px;padding:14px 16px;cursor:pointer;text-align:left;width:100%;font-family:inherit;color:#e8ecf4;margin-bottom:8px;transition:background .2s}
.sc:hover{background:rgba(100,140,255,.12)}
.nav{display:flex;justify-content:space-between;margin-top:40px;gap:16px}
.tst{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:#4ade80;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;z-index:100;transition:transform .4s ease;backdrop-filter:blur(12px)}
.tst.show{transform:translateX(-50%) translateY(0)}
.bp.dis{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.qc.miss{border-color:rgba(239,68,68,.5);animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.miss-hint{font-size:12px;color:#ef4444;margin-top:6px;font-style:italic}
@media(max-width:600px){.ctr{padding:20px 16px 60px}.qc-head{padding:14px 16px}.qc.open .qc-body{padding:0 16px 16px}.rg{grid-template-columns:1fr repeat(5,28px) 28px}.rb{width:26px;height:26px;font-size:11px}.hero{gap:16px}.hero h1{font-size:26px}.hero-logo{height:60px}.sec-logo{height:28px}}
</style>
</head>

function setRate(qid,item,val){saveInputs();if(!answers[qid])answers[qid]={};answers[qid][item]=val;render()}
function buildText(){var o="AUTOMATISIERUNGS-POTENZIALANALYSE\n\n-- Kontaktdaten --\n";for(var i=0;i<META.length;i++)o+=META[i].label+": "+(meta[META[i].id]||"\u2014")+"\n";o+="Datum: "+new Date().toLocaleDateString("de-DE")+"\n\n";for(var si=0;si<SECTIONS.length;si++){var sec=SECTIONS[si];if(!sec.questions)continue;o+="-- "+sec.icon+" "+sec.title+" --\n\n";for(var qi=0;qi<sec.questions.length;qi++){var q=sec.questions[qi];o+=q.label+"\n";var a=answers[q.id];if(q.type==="rating"&&a){for(var ri=0;ri<q.items.length;ri++)o+="  "+q.items[ri]+": "+(a[q.items[ri]]||"\u2014")+"/5\n"}else if(q.type==="multi"&&Array.isArray(a)){o+="  "+(a.length?a.join(", "):"\u2014")+"\n";if(answers[q.id+"_sonst"])o+="  Sonstiges: "+answers[q.id+"_sonst"]+"\n"}else if(q.type==="freetext"){o+="  "+(a||"\u2014")+"\n"}else{o+="  \u2014\n"}o+="\n"}}return o}
function buildPayload(){var p={meta:{},sections:{},submittedAt:new Date().toISOString()};for(var i=0;i<META.length;i++)p.meta[META[i].label]=meta[META[i].id]||"";for(var si=0;si<SECTIONS.length;si++){var sec=SECTIONS[si];if(!sec.questions)continue;var d={};for(var qi=0;qi<sec.questions.length;qi++){var q=sec.questions[qi],a=answers[q.id];if(q.type==="rating")d[q.label]=a||{};else if(q.type==="multi")d[q.label]={selected:a||[],sonstiges:answers[q.id+"_sonst"]||""};else d[q.label]=a||""}p.sections[sec.title]=d}return p}
function doSubmit(){saveInputs();if(CONFIG.webhookUrl){fetch(CONFIG.webhookUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(buildPayload())}).then(function(r){if(r.ok){submitted=true;render();showToast("\u2713 Erfolgreich \u00fcbermittelt!")}else{fallbackSubmit()}}).catch(function(){fallbackSubmit()})}else{fallbackSubmit()}}
function fallbackSubmit(){try{navigator.clipboard.writeText(buildText())}catch(e){}var s=encodeURIComponent("Potenzialanalyse \u2014 "+(meta.m_company||"Neuer Kunde"));var b=encodeURIComponent("Antworten in der Zwischenablage.\n\n");window.location.href="mailto:"+CONFIG.fallbackEmail+"?subject="+s+"&body="+b;submitted=true;render();showToast("\u2713 Kopiert!")}
render();

</script>
</body>
