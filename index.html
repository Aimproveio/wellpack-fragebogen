<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automatisierungs-Potenzialanalyse</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0a0f1e,#121b35,#0d1527);color:#e8ecf4;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
html{scroll-behavior:smooth}
#app{min-height:100vh}
.pbar{position:sticky;top:0;z-index:50;background:rgba(10,15,30,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(100,140,255,.1)}
.pbar-in{max-width:760px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:16px}
.plbl{font-family:monospace;font-size:11px;color:#648cff;white-space:nowrap}
.ptrk{flex:1;height:4px;background:rgba(100,140,255,.12);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#648cff,#a78bfa);border-radius:2px;transition:width .5s ease}
.ctr{max-width:760px;margin:0 auto;padding:32px 24px 80px}
.bp{background:linear-gradient(135deg,#648cff,#a78bfa);color:#fff;border:none;border-radius:10px;padding:14px 48px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 24px rgba(100,140,255,.3)}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(100,140,255,.4)}
.bs{padding:12px 28px;border-radius:10px;border:1px solid rgba(100,140,255,.2);background:transparent;color:#648cff;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.bs:hover{background:rgba(100,140,255,.08)}
.inp{width:100%;background:rgba(0,0,0,.25);border:1px solid rgba(100,140,255,.1);border-radius:8px;padding:10px 14px;color:#e8ecf4;font-size:14px;font-family:inherit;outline:0}
.inp:focus{border-color:rgba(100,140,255,.35)}
textarea.inp{resize:vertical;line-height:1.6;min-height:100px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:32px}
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid rgba(100,140,255,.1);background:rgba(100,140,255,.04);color:#5a6478}
.pill.on{border-color:#648cff;background:rgba(100,140,255,.15);color:#a78bfa}
.qc{background:rgba(100,140,255,.04);border:1px solid rgba(100,140,255,.08);border-radius:14px;padding:20px 24px;margin-bottom:24px}
.ql{font-size:15px;font-weight:600;margin-bottom:4px;line-height:1.5}
.qh{font-size:13px;color:#6b7689;margin-bottom:12px;font-style:italic}
.so{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid rgba(100,140,255,.1);background:rgba(0,0,0,.15);color:#c0c8d8;font-size:14px;cursor:pointer;font-family:inherit;text-align:left;width:100%;margin-bottom:6px}
.so.on{border-color:#648cff;background:rgba(100,140,255,.12);color:#a78bfa}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(100,140,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.so.on .dot{border-color:#648cff;background:#648cff}
.doti{width:8px;height:8px;border-radius:50%;background:#fff;display:none}
.so.on .doti{display:block}
.mt{padding:8px 16px;border-radius:20px;border:1px solid rgba(100,140,255,.12);background:rgba(0,0,0,.15);color:#8892a8;font-size:13px;cursor:pointer;font-family:inherit;display:inline-block;margin:0 6px 8px 0}
.mt.on{border-color:#648cff;background:rgba(100,140,255,.15);color:#a78bfa;font-weight:600}
.rg{display:grid;grid-template-columns:1fr repeat(5,36px) 36px;gap:4px;align-items:center;margin-bottom:6px}
.rb{width:32px;height:32px;border-radius:50%;border:1px solid rgba(100,140,255,.15);background:rgba(0,0,0,.2);color:#5a6478;font-size:13px;font-weight:600;cursor:pointer;font-family:monospace;display:flex;align-items:center;justify-content:center;margin:0 auto;padding:0}
.rb.on{border:2px solid #648cff;color:#a78bfa}
.sc{background:rgba(100,140,255,.06);border:1px solid rgba(100,140,255,.12);border-radius:10px;padding:14px 16px;cursor:pointer;text-align:left;width:100%;font-family:inherit;color:#e8ecf4;margin-bottom:8px}
.sc:hover{background:rgba(100,140,255,.12)}
.nav{display:flex;justify-content:space-between;margin-top:40px;gap:16px}
.tst{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:#4ade80;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;z-index:100;transition:transform .4s ease;backdrop-filter:blur(12px)}
.tst.show{transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.ctr{padding:20px 16px 60px}.qc{padding:16px}.rg{grid-template-columns:1fr repeat(5,28px) 28px}.rb{width:26px;height:26px;font-size:11px}}
</style>
</head>
<body>
<div id="app"></div>
<div class="tst" id="toast"></div>
<script>
// === CONFIG ===
var CONFIG = {
  webhookUrl: "",
  fallbackEmail: "emre.tanrikulu@web.de",
  companyName: "AI Improve"
};

// === DATA ===
var META = [
  {id: "m_company", label: "Unternehmen"},
  {id: "m_name", label: "Ansprechpartner"},
  {id: "m_position", label: "Position / Abteilung"},
  {id: "m_email", label: "E-Mail"}
];

var SECTIONS = [
  {id: "intro", title: "Willkommen", intro: true},
  {id: "company", title: "Unternehmen & Struktur", icon: "\uD83C\uDFE2",
   description: "Damit wir Ihr Unternehmen und dessen Komplexit\u00e4t verstehen.",
   questions: [
    {id: "c1", label: "Beschreiben Sie kurz Ihr Unternehmen und Ihre Kerndienstleistungen.", hint: "Was macht Ihr Unternehmen? Welche Services bieten Sie an?", type: "textarea"},
    {id: "c2", label: "Wie ist Ihr Unternehmen strukturiert?", hint: "Anzahl Standorte, L\u00e4nder, Tochtergesellschaften, Abteilungen", type: "textarea"},
    {id: "c3", label: "Wie viele Mitarbeiter besch\u00e4ftigen Sie insgesamt?", hint: "Ungef\u00e4hre Zahlen reichen \u2014 z. B. 120 gesamt, davon 40 Lager, 30 Transport", type: "textarea"},
    {id: "c4", label: "Wie hoch ist Ihre Mitarbeiterfluktuation?", type: "select", options: ["Gering (< 10 %)", "Mittel (10\u201325 %)", "Hoch (> 25 %)", "Unsicher / keine Daten"]},
    {id: "c4b", label: "In welchen Bereichen ist die Fluktuation am h\u00f6chsten?", hint: "Z. B. Lager, Transport, Produktion, Verwaltung", type: "text"}
  ]},
  {id: "tools", title: "Aktuelle Prozesse & Tools", icon: "\u2699\uFE0F",
   description: "Wie arbeiten Sie heute und welche Tools setzen Sie ein?",
   questions: [
    {id: "t1", label: "Welche Software-Systeme und Tools nutzen Sie aktuell?", hint: "Mehrfachauswahl m\u00f6glich", type: "multi", options: ["ERP (SAP, DATEV, BMD o. \u00e4.)", "CRM (HubSpot, Salesforce, Pipedrive o. \u00e4.)", "WMS / Lagerverwaltung", "Buchhaltungssoftware", "Google Workspace", "Microsoft 365", "Slack / Teams", "Projektmanagement (Asana, Monday o. \u00e4.)", "Eigenentwicklung / Individualsoftware", "Keines / Excel-basiert"]},
    {id: "t1b", label: "Weitere Tools?", type: "text", hint: "Optional"},
    {id: "t2", label: "Wie kommunizieren Ihre Teams intern? Und mit Kunden?", hint: "E-Mail, Telefon, WhatsApp, Slack/Teams, pers\u00f6nlich?", type: "textarea"},
    {id: "t3", label: "Wie werden neue Mitarbeiter eingearbeitet?", hint: "Strukturierte Pl\u00e4ne, Videos? Oder eher m\u00fcndlich? Wie lange dauert es?", type: "textarea"},
    {id: "t4", label: "Wie werden Auftr\u00e4ge angenommen und bearbeitet?", hint: "E-Mail, Telefon, Portal, Fax? Gibt es Medienbr\u00fcche?", type: "textarea"},
    {id: "t5", label: "Wie werden Dokumente verwaltet?", type: "select", options: ["Vollst\u00e4ndig digital & strukturiert", "\u00dcberwiegend digital, aber unstrukturiert", "Mix aus digital und Papier", "\u00dcberwiegend Papier", "Kein einheitliches System"]},
    {id: "t6", label: "Wie erstellen und versenden Sie Angebote und Rechnungen?", hint: "Manuell in Word/Excel? Aus einem System heraus?", type: "textarea"}
  ]},
  {id: "pain", title: "Engp\u00e4sse & Pain Points", icon: "\uD83D\uDD25",
   description: "Wo hakt es? Was kostet Sie Zeit, Nerven und Geld?",
   questions: [
    {id: "p1", label: "Was sind die 3 gr\u00f6\u00dften zeitfressenden T\u00e4tigkeiten?", hint: "Wiederkehrend, fehleranf\u00e4llig, viel manuelle Arbeit", type: "textarea"},
    {id: "p2", label: "Wo gehen regelm\u00e4\u00dfig Informationen verloren?", hint: "Auftr\u00e4ge die untergehen, E-Mails die nicht beantwortet werden", type: "textarea"},
    {id: "p3", label: "Welche Prozesse sind papierbasiert oder manuell?", hint: "Checklisten, Excel-Pflege, Faxe, physische Unterschriften", type: "textarea"},
    {id: "p4", label: "Wie gut funktioniert der Informationsfluss zwischen Standorten?", type: "select", options: ["Sehr gut \u2014 alle immer informiert", "Gut \u2014 kleinere L\u00fccken", "Mittelm\u00e4\u00dfig \u2014 regelm\u00e4\u00dfige Probleme", "Schlecht \u2014 h\u00e4ufige Verluste", "Sehr schlecht \u2014 jeder arbeitet isoliert"]},
    {id: "p5", label: "Bewerten Sie folgende Bereiche:", hint: "1 = kein Problem, 5 = kritisches Problem", type: "rating", items: ["Interne Kommunikation", "Kundenanfragen / Reaktionszeit", "Einarbeitung neuer Mitarbeiter", "Dokumentenverwaltung / Ablage", "Auftragsabwicklung / Fulfillment", "Reporting / Zahlen f\u00fcr die GF", "Vertrieb / Lead-Management", "Rechnungsstellung / Mahnwesen", "IT-Infrastruktur / Systeme", "Qualit\u00e4tskontrolle / Reklamationen"]}
  ]},
  {id: "sales", title: "Vertrieb & Kunden", icon: "\uD83E\uDD1D",
   description: "Ihre Go-to-Market- und Kundenbindungsprozesse.",
   questions: [
    {id: "s1", label: "Wie gewinnen Sie aktuell neue Kunden?", type: "multi", options: ["Empfehlungen", "Kaltakquise", "Website / Inbound", "Messen & Events", "Partnerschaften", "Social Media", "Bezahlte Werbung"]},
    {id: "s1b", label: "Was funktioniert am besten?", type: "text"},
    {id: "s2", label: "Nutzen Sie ein CRM-System?", type: "select", options: ["Ja \u2014 HubSpot", "Ja \u2014 Salesforce", "Ja \u2014 Pipedrive", "Ja \u2014 anderes", "Nein \u2014 Excel", "Nein \u2014 Outlook", "Nein \u2014 gar nicht"]},
    {id: "s3", label: "Wie sieht Ihr Vertriebsprozess aus?", hint: "Vom Erstkontakt bis Abschluss. Wo bleibt es h\u00e4ngen?", type: "textarea"},
    {id: "s4", label: "Wie halten Sie Kontakt zu Bestandskunden?", type: "select", options: ["Regelm\u00e4\u00dfige Calls (proaktiv)", "Gelegentliche Updates", "Eher reaktiv bei Problemen", "Kaum / gar nicht"]},
    {id: "s5", label: "Welche Rolle spielt Ihre Website?", type: "select", options: ["Generiert aktiv Leads", "Kontaktformular, wenig genutzt", "Digitale Visitenkarte", "Keine Website / veraltet"]}
  ]},
  {id: "finance", title: "Finance & Reporting", icon: "\uD83D\uDCCA",
   description: "Transparenz in Ihren Finanzdaten und Controlling.",
   questions: [
    {id: "f1", label: "Wie erstellen Sie interne Reports?", hint: "Manuell in Excel? Automatisch aus ERP? Wie oft?", type: "textarea"},
    {id: "f2", label: "Welche KPIs tracken Sie regelm\u00e4\u00dfig?", type: "multi", options: ["Umsatz", "Marge", "Auslastung", "Durchlaufzeiten", "Reklamationsquoten", "Mitarbeiterzufriedenheit", "Churn", "Keine regelm\u00e4\u00dfigen KPIs"]},
    {id: "f3", label: "Reporting zwischen T\u00f6chtern und Zentrale?", type: "select", options: ["Automatisiert", "Manuell, einheitlich", "Manuell, uneinheitlich", "Gibt es nicht", "Nicht zutreffend"]},
    {id: "f4", label: "Wie verwalten Sie Vertr\u00e4ge?", hint: "Zentrale Ablage? Wer \u00fcberwacht Laufzeiten?", type: "textarea"}
  ]},
  {id: "vision", title: "Zukunftsvision & Priorit\u00e4ten", icon: "\uD83D\uDE80",
   description: "Wo wollen Sie hin und was hat die h\u00f6chste Priorit\u00e4t?",
   questions: [
    {id: "v1", label: "Zauberstab: Welche 3 Dinge w\u00fcrden Sie sofort \u00e4ndern?", hint: "Keine Grenzen \u2014 was w\u00fcrden Sie morgen anders machen?", type: "textarea"},
    {id: "v2", label: "Welche Prozesse w\u00fcrden Sie am liebsten automatisieren?", hint: "Alles was wiederkehrend, zeitaufw\u00e4ndig oder fehleranf\u00e4llig ist.", type: "textarea"},
    {id: "v3", label: "Gibt es Projekte, die Sie schon l\u00e4nger umsetzen wollen?", hint: "Kundenportal, App, CRM, Mitarbeiter-Training etc.", type: "textarea"},
    {id: "v4", label: "Messbarer Erfolg in 3, 6 und 12 Monaten?", hint: "Z. B. 50% weniger manuelle Dateneingabe", type: "textarea"},
    {id: "v5", label: "Budget f\u00fcr Automatisierung?", type: "select", options: ["< 5.000 EUR/Monat", "5.000\u201315.000 EUR/Monat", "15.000\u201350.000 EUR/Monat", "> 50.000 EUR/Monat", "Einmaliges Projektbudget", "Noch unklar"]},
    {id: "v5b", label: "Erg\u00e4nzung zum Budget (optional)", type: "text"},
    {id: "v6", label: "Gibt es noch etwas, das wir wissen sollten?", hint: "Besondere Herausforderungen, strategische Entscheidungen", type: "textarea"}
  ]},
  {id: "done", title: "Fertig", done: true}
];

// === STATE ===
var step = 0;
var answers = {};
var meta = {};
var submitted = false;

// === HELPERS ===
function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function hasAns(id, type) {
  var a = answers[id];
  if (type === "rating") return a && Object.keys(a).length > 0;
  if (type === "multi") return Array.isArray(a) && a.length > 0;
  return a && String(a).length > 0;
}

function saveInputs() {
  var els = document.querySelectorAll("[data-qinp]");
  for (var i = 0; i < els.length; i++) {
    answers[els[i].getAttribute("data-qinp")] = els[i].value;
  }
  var mels = document.querySelectorAll("[data-minp]");
  for (var i = 0; i < mels.length; i++) {
    meta[mels[i].getAttribute("data-minp")] = mels[i].value;
  }
}

function go(n) {
  saveInputs();
  step = n;
  render();
  window.scrollTo({top: 0, behavior: "smooth"});
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2500);
}

// === RENDER ===
function render() {
  var sec = SECTIONS[step];
  var total = SECTIONS.length;
  var pct = Math.round(step / (total - 1) * 100);
  var h = "";

  // Progress bar
  h += '<div class="pbar"><div class="pbar-in">';
  h += '<span class="plbl">' + String(step).padStart(2, "0") + "/" + String(total - 1).padStart(2, "0") + '</span>';
  h += '<div class="ptrk"><div class="pfill" style="width:' + pct + '%"></div></div>';
  h += '<span class="plbl">' + pct + '%</span>';
  h += '</div></div>';
  h += '<div class="ctr">';

  // --- INTRO ---
  if (sec.intro) {
    h += '<div style="text-align:center;padding-top:60px">';
    h += '<div style="font-size:13px;font-family:monospace;color:#648cff;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px">Fragebogen</div>';
    h += '<h1 style="font-size:38px;font-weight:700;line-height:1.2;margin-bottom:16px;background:linear-gradient(135deg,#e8ecf4,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Automatisierungs-Potenzialanalyse</h1>';
    h += '<p style="font-size:17px;color:#8892a8;max-width:540px;margin:0 auto 40px;line-height:1.6">Dieser Fragebogen hilft uns, Ihr Unternehmen zu verstehen und die gr\u00f6\u00dften Automatisierungspotenziale zu identifizieren. Ihre Antworten werden vertraulich behandelt.</p>';
    h += '<p style="font-size:14px;color:#5a6478;margin-bottom:40px">\u23F1 ca. 30\u201345 Minuten</p>';
    h += '<div style="text-align:left;max-width:440px;margin:0 auto 40px;display:flex;flex-direction:column;gap:14px">';
    for (var i = 0; i < META.length; i++) {
      var f = META[i];
      h += '<div><label style="font-size:12px;font-weight:500;color:#8892a8;display:block;margin-bottom:4px">' + f.label + ' *</label>';
      h += '<input class="inp" data-minp="' + f.id + '" value="' + esc(meta[f.id] || "") + '" placeholder="' + f.label + '"></div>';
    }
    h += '</div>';
    h += '<button class="bp" onclick="go(1)">Starten \u2192</button>';
    h += '</div>';

  // --- DONE ---
  } else if (sec.done) {
    h += '<div style="padding-top:40px"><div style="text-align:center;margin-bottom:40px">';
    h += '<div style="font-size:48px;margin-bottom:16px">' + (submitted ? "\uD83C\uDF89" : "\u2705") + '</div>';
    h += '<h1 style="font-size:32px;font-weight:700;margin-bottom:12px">' + (submitted ? "Vielen Dank!" : "Fast geschafft!") + '</h1>';
    h += '<p style="color:#8892a8;font-size:16px;max-width:480px;margin:0 auto">' + (submitted ? "Ihre Antworten wurden \u00fcbermittelt. Wir melden uns in K\u00fcrze." : "Pr\u00fcfen Sie Ihre Antworten und senden Sie ab.") + '</p></div>';

    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px">';
    for (var i = 0; i < SECTIONS.length; i++) {
      var s = SECTIONS[i];
      if (!s.questions) continue;
      var cnt = 0;
      for (var j = 0; j < s.questions.length; j++) {
        if (hasAns(s.questions[j].id, s.questions[j].type)) cnt++;
      }
      h += '<button class="sc" onclick="go(' + i + ')"><div style="font-size:14px;font-weight:600">' + s.icon + " " + s.title + '</div><div style="font-size:12px;color:#648cff;margin-top:4px">' + cnt + '/' + s.questions.length + ' beantwortet</div></button>';
    }
    h += '</div>';

    if (!submitted) {
      h += '<button class="bp" style="width:100%;padding:16px 0;font-size:17px" onclick="doSubmit()">\uD83D\uDCE8 Fragebogen absenden</button>';
    } else {
      h += '<div style="text-align:center;padding:20px 0;color:#4ade80;font-size:15px;font-weight:600">\u2713 Erfolgreich \u00fcbermittelt</div>';
    }
    h += '<button class="bs" style="display:block;margin:16px auto 0" onclick="go(0)">\u2190 Zur\u00fcck zum Anfang</button></div>';

  // --- QUESTIONS ---
  } else if (sec.questions) {
    // Nav pills
    h += '<div class="pills">';
    for (var i = 0; i < SECTIONS.length; i++) {
      var s = SECTIONS[i];
      if (!s.questions) continue;
      h += '<button class="pill' + (i === step ? " on" : "") + '" onclick="go(' + i + ')">' + s.icon + " " + s.title + '</button>';
    }
    h += '</div>';

    h += '<div style="margin-bottom:32px"><div style="font-size:36px;margin-bottom:8px">' + sec.icon + '</div>';
    h += '<h2 style="font-size:28px;font-weight:700;margin-bottom:8px">' + sec.title + '</h2>';
    h += '<p style="color:#8892a8;font-size:15px">' + sec.description + '</p></div>';

    for (var qi = 0; qi < sec.questions.length; qi++) {
      var q = sec.questions[qi];
      h += '<div class="qc"><div class="ql">' + q.label + '</div>';
      if (q.hint) h += '<div class="qh">' + q.hint + '</div>';

      if (q.type === "text") {
        h += '<input class="inp" data-qinp="' + q.id + '" value="' + esc(answers[q.id] || "") + '">';
      } else if (q.type === "textarea") {
        h += '<textarea class="inp" data-qinp="' + q.id + '" rows="4">' + esc(answers[q.id] || "") + '</textarea>';
      } else if (q.type === "select") {
        for (var oi = 0; oi < q.options.length; oi++) {
          var opt = q.options[oi];
          var on = answers[q.id] === opt;
          h += '<button class="so' + (on ? " on" : "") + '" onclick="selOpt(\'' + q.id + '\',this.textContent)"><span class="dot"><span class="doti"></span></span>' + opt + '</button>';
        }
      } else if (q.type === "multi") {
        var cur = answers[q.id] || [];
        for (var oi = 0; oi < q.options.length; oi++) {
          var opt = q.options[oi];
          var on = cur.indexOf(opt) >= 0;
          h += '<button class="mt' + (on ? " on" : "") + '" onclick="togMulti(\'' + q.id + '\',this.getAttribute(\'data-v\'))" data-v="' + esc(opt) + '">' + (on ? "\u2713 " : "") + opt + '</button>';
        }
      } else if (q.type === "rating") {
        h += '<div style="display:flex;flex-direction:column;gap:8px">';
        h += '<div class="rg"><span style="font-size:11px;color:#5a6478"></span>';
        for (var n = 1; n <= 5; n++) h += '<span style="font-size:11px;color:#5a6478;text-align:center">' + n + '</span>';
        h += '<span style="font-size:10px;color:#5a6478;text-align:center">N/A</span></div>';
        var vals = answers[q.id] || {};
        for (var ri = 0; ri < q.items.length; ri++) {
          var item = q.items[ri];
          var v = vals[item];
          h += '<div class="rg"><span style="font-size:13px;color:#c0c8d8">' + item + '</span>';
          for (var n = 1; n <= 5; n++) {
            h += '<button class="rb' + (v === n ? " on" : "") + '" onclick="setRate(\'' + q.id + '\',\'' + esc(item) + '\',' + n + ')">' + n + '</button>';
          }
          h += '<button class="rb' + (v === "N/A" ? " on" : "") + '" onclick="setRate(\'' + q.id + '\',\'' + esc(item) + '\',\'N/A\')" style="font-size:10px">\u2014</button></div>';
        }
        h += '</div>';
      }
      h += '</div>';
    }

    // Navigation
    var isLast = step === SECTIONS.length - 2;
    h += '<div class="nav">';
    h += '<button class="bs" onclick="go(' + Math.max(0, step - 1) + ')">\u2190 Zur\u00fcck</button>';
    h += '<button class="bp" style="padding:12px 36px" onclick="go(' + Math.min(SECTIONS.length - 1, step + 1) + ')">' + (isLast ? "Abschlie\u00dfen \u2713" : "Weiter \u2192") + '</button>';
    h += '</div>';
  }

  h += '</div>';
  document.getElementById("app").innerHTML = h;
}

// === INTERACTIONS ===
function selOpt(qid, val) {
  saveInputs();
  answers[qid] = val;
  render();
}

function togMulti(qid, val) {
  saveInputs();
  var cur = answers[qid] || [];
  var idx = cur.indexOf(val);
  if (idx >= 0) { cur.splice(idx, 1); } else { cur.push(val); }
  answers[qid] = cur;
  render();
}

function setRate(qid, item, val) {
  saveInputs();
  if (!answers[qid]) answers[qid] = {};
  answers[qid][item] = val;
  render();
}

// === SUBMIT ===
function buildText() {
  var o = "AUTOMATISIERUNGS-POTENZIALANALYSE\n\n";
  o += "-- Kontaktdaten --\n";
  for (var i = 0; i < META.length; i++) {
    o += META[i].label + ": " + (meta[META[i].id] || "\u2014") + "\n";
  }
  o += "Datum: " + new Date().toLocaleDateString("de-DE") + "\n\n";
  for (var si = 0; si < SECTIONS.length; si++) {
    var sec = SECTIONS[si];
    if (!sec.questions) continue;
    o += "-- " + sec.icon + " " + sec.title + " --\n\n";
    for (var qi = 0; qi < sec.questions.length; qi++) {
      var q = sec.questions[qi];
      o += q.label + "\n";
      var a = answers[q.id];
      if (q.type === "rating" && a) {
        for (var ri = 0; ri < q.items.length; ri++) {
          o += "  " + q.items[ri] + ": " + (a[q.items[ri]] || "\u2014") + "/5\n";
        }
      } else if (q.type === "multi" && Array.isArray(a)) {
        o += "  " + (a.length ? a.join(", ") : "\u2014") + "\n";
      } else {
        o += "  " + (a || "\u2014") + "\n";
      }
      o += "\n";
    }
  }
  return o;
}

function buildPayload() {
  var p = {meta: {}, sections: {}, submittedAt: new Date().toISOString()};
  for (var i = 0; i < META.length; i++) {
    p.meta[META[i].label] = meta[META[i].id] || "";
  }
  for (var si = 0; si < SECTIONS.length; si++) {
    var sec = SECTIONS[si];
    if (!sec.questions) continue;
    var d = {};
    for (var qi = 0; qi < sec.questions.length; qi++) {
      var q = sec.questions[qi];
      var a = answers[q.id];
      if (q.type === "rating") d[q.label] = a || {};
      else if (q.type === "multi") d[q.label] = a || [];
      else d[q.label] = a || "";
    }
    p.sections[sec.title] = d;
  }
  return p;
}

function doSubmit() {
  saveInputs();

  if (CONFIG.webhookUrl) {
    fetch(CONFIG.webhookUrl, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(buildPayload())
    }).then(function(r) {
      if (r.ok) {
        submitted = true;
        render();
        showToast("\u2713 Erfolgreich \u00fcbermittelt!");
      } else { fallbackSubmit(); }
    }).catch(function() { fallbackSubmit(); });
  } else {
    fallbackSubmit();
  }
}

function fallbackSubmit() {
  try { navigator.clipboard.writeText(buildText()); } catch(e) {}
  var subj = encodeURIComponent("Potenzialanalyse \u2014 " + (meta.m_company || "Neuer Kunde"));
  var body = encodeURIComponent("Antworten sind in der Zwischenablage.\n\n");
  window.location.href = "mailto:" + CONFIG.fallbackEmail + "?subject=" + subj + "&body=" + body;
  submitted = true;
  render();
  showToast("\u2713 Kopiert! E-Mail wird ge\u00f6ffnet.");
}

// === INIT ===
render();
</script>
</body>
</html>
