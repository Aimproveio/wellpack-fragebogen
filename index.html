<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Automatisierungs-Potenzialanalyse | AI Improve</title>

<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f1e; --bg2: #121b35; --surface: rgba(100,140,255,0.04);
    --border: rgba(100,140,255,0.1); --border-active: rgba(100,140,255,0.35);
    --text: #e8ecf4; --text-muted: #8892a8; --text-dim: #5a6478;
    --accent: #648cff; --accent2: #a78bfa; --success: #4ade80;
    --font: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    --mono: 'Space Mono', 'Courier New', monospace;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font); background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, #0d1527 100%); color: var(--text); min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  
  .progress-bar { position: sticky; top: 0; z-index: 50; background: rgba(10,15,30,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .progress-inner { max-width: 760px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  .progress-label { font-family: var(--mono); font-size: 11px; color: var(--accent); white-space: nowrap; }
  .progress-track { flex: 1; height: 4px; background: rgba(100,140,255,0.12); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  
  .container { max-width: 760px; margin: 0 auto; padding: 32px 24px 80px; }
  
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 10px; padding: 14px 48px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 24px rgba(100,140,255,0.3); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(100,140,255,0.4); }
  .btn-secondary { padding: 12px 28px; border-radius: 10px; border: 1px solid rgba(100,140,255,0.2); background: transparent; color: var(--accent); font-size: 15px; font-weight: 500; cursor: pointer; font-family: var(--font); transition: background 0.2s; }
  .btn-secondary:hover { background: rgba(100,140,255,0.08); }
  
  .input-field { width: 100%; background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: var(--font); outline: none; transition: border-color 0.2s; }
  .input-field:focus { border-color: var(--border-active); }
  textarea.input-field { resize: vertical; line-height: 1.6; min-height: 100px; }
  
  .nav-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 32px; }
  .nav-pill { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--font); border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); transition: all 0.2s; }
  .nav-pill.active { border-color: var(--accent); background: rgba(100,140,255,0.15); color: var(--accent2); }
  
  .question-card { background: var(--surface); border: 1px solid rgba(100,140,255,0.08); border-radius: 14px; padding: 20px 24px; transition: border-color 0.3s; }
  .question-label { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.5; }
  .question-hint { font-size: 13px; color: #6b7689; margin-bottom: 12px; font-style: italic; line-height: 1.5; }
  
  .select-option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.15); color: #c0c8d8; font-size: 14px; cursor: pointer; font-family: var(--font); text-align: left; transition: all 0.15s; width: 100%; }
  .select-option.selected { border-color: var(--accent); background: rgba(100,140,255,0.12); color: var(--accent2); }
  .radio-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(100,140,255,0.2); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .selected .radio-dot { border-color: var(--accent); background: var(--accent); }
  .radio-dot-inner { width: 8px; height: 8px; border-radius: 50%; background: #fff; display: none; }
  .selected .radio-dot-inner { display: block; }
  
  .multi-tag { padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(100,140,255,0.12); background: rgba(0,0,0,0.15); color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .multi-tag.selected { border-color: var(--accent); background: rgba(100,140,255,0.15); color: var(--accent2); font-weight: 600; }
  
  .rating-grid { display: grid; grid-template-columns: 1fr repeat(5, 36px) 36px; gap: 4px; align-items: center; }
  .rating-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(100,140,255,0.15); background: rgba(0,0,0,0.2); color: var(--text-dim); font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--mono); display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin: 0 auto; padding: 0; }
  .rating-btn.selected { border: 2px solid var(--accent); color: var(--accent2); }
  .rating-btn.s1 { background: rgba(100,140,255,0.06); }
  .rating-btn.s2 { background: rgba(100,140,255,0.10); }
  .rating-btn.s3 { background: rgba(100,140,255,0.14); }
  .rating-btn.s4 { background: rgba(100,140,255,0.18); }
  .rating-btn.s5 { background: rgba(100,140,255,0.22); }
  
  .summary-card { background: rgba(100,140,255,0.06); border: 1px solid rgba(100,140,255,0.12); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: background 0.2s; text-align: left; width: 100%; font-family: var(--font); color: var(--text); border: 1px solid rgba(100,140,255,0.12); }
  .summary-card:hover { background: rgba(100,140,255,0.12); }
  
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.3); color: var(--success); padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 100; transition: transform 0.4s cubic-bezier(.4,0,.2,1); backdrop-filter: blur(12px); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  
  @media (max-width: 600px) {
    .container { padding: 20px 16px 60px; }
    .question-card { padding: 16px; }
    .rating-grid { grid-template-columns: 1fr repeat(5, 30px) 30px; gap: 2px; }
    .rating-btn { width: 28px; height: 28px; font-size: 11px; }
    .rating-grid .rating-label { font-size: 11px; }
    h1 { font-size: 28px !important; }
    h2 { font-size: 24px !important; }
  }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

const SECTIONS = [
  { id: "intro", title: "Willkommen", intro: true },
  {
    id: "company", title: "Unternehmen & Struktur", icon: "🏢",
    description: "Damit wir Ihr Unternehmen und dessen Komplexität verstehen.",
    questions: [
      { id: "c1", label: "Beschreiben Sie kurz Ihr Unternehmen und Ihre Kerndienstleistungen.", hint: "Was macht Ihr Unternehmen? Welche Services bieten Sie an? In welchen Branchen sind Sie aktiv?", type: "textarea" },
      { id: "c2", label: "Wie ist Ihr Unternehmen strukturiert?", hint: "Anzahl Standorte, Länder, Tochtergesellschaften, wichtige Abteilungen", type: "textarea" },
      { id: "c3", label: "Wie viele Mitarbeiter beschäftigen Sie insgesamt?", hint: "Ungefähre Zahlen reichen — z. B. 120 gesamt, davon 40 Lager, 30 Transport, 20 Verwaltung", type: "textarea" },
      { id: "c4", label: "Wie hoch ist Ihre Mitarbeiterfluktuation?", type: "select", options: ["Gering (< 10 %)", "Mittel (10–25 %)", "Hoch (> 25 %)", "Unsicher / keine Daten"] },
      { id: "c4b", label: "In welchen Bereichen ist die Fluktuation am höchsten?", hint: "Z. B. Lager, Transport, Produktion, Verwaltung", type: "text" },
    ]
  },
  {
    id: "tools", title: "Aktuelle Prozesse & Tools", icon: "⚙️",
    description: "Wie arbeiten Sie heute und welche Tools setzen Sie ein?",
    questions: [
      { id: "t1", label: "Welche Software-Systeme und Tools nutzen Sie aktuell?", hint: "Mehrfachauswahl möglich", type: "multi", options: ["ERP (SAP, DATEV, BMD o. ä.)", "CRM (HubSpot, Salesforce, Pipedrive o. ä.)", "WMS / Lagerverwaltung", "Buchhaltungssoftware", "Google Workspace", "Microsoft 365", "Slack / Teams", "Projektmanagement (Asana, Monday o. ä.)", "Eigenentwicklung / Individualsoftware", "Keines / Excel-basiert"] },
      { id: "t1b", label: "Weitere Tools, die nicht aufgelistet sind?", type: "text", hint: "Optional" },
      { id: "t2", label: "Wie kommunizieren Ihre Teams intern? Und mit Kunden?", hint: "E-Mail, Telefon, WhatsApp, Slack/Teams, persönlich?", type: "textarea" },
      { id: "t3", label: "Wie werden aktuell neue Mitarbeiter eingearbeitet?", hint: "Strukturierte Pläne, Checklisten, Videos? Oder eher mündlich? Wie lange dauert es?", type: "textarea" },
      { id: "t4", label: "Wie werden Aufträge aktuell angenommen und bearbeitet?", hint: "E-Mail, Telefon, Portal, Fax? Gibt es Medienbrüche (Papier → System)?", type: "textarea" },
      { id: "t5", label: "Wie werden Dokumente verwaltet?", type: "select", options: ["Vollständig digital & strukturiert", "Überwiegend digital, aber unstrukturiert", "Mix aus digital und Papier", "Überwiegend Papier", "Kein einheitliches System"] },
      { id: "t6", label: "Wie erstellen und versenden Sie Angebote und Rechnungen?", hint: "Manuell in Word/Excel? Aus einem System heraus? Wie lange dauert es?", type: "textarea" },
    ]
  },
  {
    id: "pain", title: "Engpässe & Pain Points", icon: "🔥",
    description: "Wo hakt es? Was kostet Sie Zeit, Nerven und Geld?",
    questions: [
      { id: "p1", label: "Was sind die 3 größten zeitfressenden Tätigkeiten in Ihrem Unternehmen?", hint: "Wiederkehrend, fehleranfällig, viel manuelle Arbeit", type: "textarea" },
      { id: "p2", label: "Wo gehen aktuell regelmäßig Informationen verloren?", hint: "Aufträge die untergehen, E-Mails die nicht beantwortet werden etc.", type: "textarea" },
      { id: "p3", label: "Welche Prozesse sind papierbasiert oder erfordern manuelle Dateneingabe?", hint: "Handschriftliche Checklisten, manuelle Excel-Pflege, Faxe etc.", type: "textarea" },
      { id: "p4", label: "Wie gut funktioniert der Informationsfluss zwischen Standorten/Abteilungen?", type: "select", options: ["Sehr gut — alle sind immer informiert", "Gut — mit kleineren Lücken", "Mittelmäßig — regelmäßige Probleme", "Schlecht — häufige Informationsverluste", "Sehr schlecht — jeder arbeitet isoliert"] },
      { id: "p5", label: "Bewerten Sie folgende Bereiche:", hint: "1 = kein Problem · 5 = kritisches Problem", type: "rating", items: [
        "Interne Kommunikation", "Kundenanfragen / Reaktionszeit", "Einarbeitung neuer Mitarbeiter",
        "Dokumentenverwaltung / Ablage", "Auftragsabwicklung / Fulfillment", "Reporting / Zahlen für die GF",
        "Vertrieb / Lead-Management", "Rechnungsstellung / Mahnwesen", "IT-Infrastruktur / Systeme",
        "Qualitätskontrolle / Reklamationen"
      ]},
    ]
  },
  {
    id: "sales", title: "Vertrieb & Kundenbeziehungen", icon: "🤝",
    description: "Ihre Go-to-Market- und Kundenbindungsprozesse.",
    questions: [
      { id: "s1", label: "Wie gewinnen Sie aktuell neue Kunden?", type: "multi", options: ["Empfehlungen / Mundpropaganda", "Kaltakquise (Telefon/E-Mail)", "Website / Inbound", "Messen & Events", "Partnerschaften / Netzwerk", "Social Media", "Bezahlte Werbung (Google Ads etc.)"] },
      { id: "s1b", label: "Was funktioniert davon am besten?", type: "text" },
      { id: "s2", label: "Nutzen Sie ein CRM-System?", type: "select", options: ["Ja — HubSpot", "Ja — Salesforce", "Ja — Pipedrive", "Ja — anderes CRM", "Nein — Excel/Tabellen", "Nein — Outlook-Kontakte", "Nein — gar nicht"] },
      { id: "s3", label: "Wie sieht Ihr Vertriebsprozess aus — vom Erstkontakt bis zum Abschluss?", hint: "Welche Schritte? Wo bleibt es häufig hängen?", type: "textarea" },
      { id: "s4", label: "Wie halten Sie den Kontakt zu Bestandskunden?", type: "select", options: ["Regelmäßige Calls/Meetings (proaktiv)", "Gelegentliche Updates", "Eher reaktiv bei Problemen", "Kaum / gar nicht"] },
      { id: "s5", label: "Welche Rolle spielt Ihre Website für die Kundengewinnung?", type: "select", options: ["Generiert aktiv Leads", "Hat Kontaktformular, wird aber wenig genutzt", "Eher eine digitale Visitenkarte", "Wir haben keine Website / veraltet"] },
    ]
  },
  {
    id: "finance", title: "Finance & Reporting", icon: "📊",
    description: "Transparenz und Geschwindigkeit in Ihren Finanzdaten.",
    questions: [
      { id: "f1", label: "Wie erstellen Sie aktuell interne Reports für die Geschäftsführung?", hint: "Manuell in Excel? Automatisch aus ERP? Wie oft? Wie lange dauert es?", type: "textarea" },
      { id: "f2", label: "Welche KPIs tracken Sie regelmäßig?", type: "multi", options: ["Umsatz", "Marge / Profitabilität", "Auslastung", "Durchlaufzeiten", "Reklamationsquoten", "Mitarbeiterzufriedenheit", "Kundenabwanderung / Churn", "Keine regelmäßigen KPIs"] },
      { id: "f3", label: "Wie funktioniert das Reporting zwischen Tochtergesellschaften und Zentrale?", type: "select", options: ["Automatisiert aus einem System", "Manuell, aber einheitliches Format", "Manuell, jeder macht es anders", "Gibt es nicht / unregelmäßig", "Nicht zutreffend"] },
      { id: "f4", label: "Wie verwalten Sie Verträge?", hint: "Zentrale Ablage? Wer überwacht Laufzeiten? Geht schon mal was unter?", type: "textarea" },
    ]
  },
  {
    id: "vision", title: "Zukunftsvision & Prioritäten", icon: "🚀",
    description: "Wo wollen Sie hin und was hat die höchste Priorität?",
    questions: [
      { id: "v1", label: "Wenn Sie einen Zauberstab hätten: Welche 3 Dinge würden Sie sofort ändern?", hint: "Keine Grenzen — was würden Sie morgen anders machen?", type: "textarea" },
      { id: "v2", label: "Welche Prozesse würden Sie am liebsten vollständig automatisieren?", hint: "Alles was wiederkehrend, zeitaufwändig oder fehleranfällig ist.", type: "textarea" },
      { id: "v3", label: "Gibt es konkrete Projekte, die Sie schon länger umsetzen wollen?", hint: "Kundenportal, App, CRM, digitale Checklisten, Mitarbeiter-Training etc.", type: "textarea" },
      { id: "v4", label: "Was wäre ein messbarer Erfolg in 3, 6 und 12 Monaten?", hint: "Z. B. „50 % weniger manuelle Dateneingabe" oder „CRM ist live"", type: "textarea" },
      { id: "v5", label: "Welches Budget haben Sie für Automatisierung eingeplant?", type: "select", options: ["< 5.000 € / Monat", "5.000–15.000 € / Monat", "15.000–50.000 € / Monat", "> 50.000 € / Monat", "Einmaliges Projektbudget", "Noch unklar"] },
      { id: "v5b", label: "Ergänzung zum Budget (optional)", type: "text", hint: "Falls Einmalbudget: ungefähre Höhe?" },
      { id: "v6", label: "Gibt es noch etwas, das wir wissen sollten?", hint: "Besondere Herausforderungen, anstehende Veränderungen, strategische Entscheidungen", type: "textarea" },
    ]
  },
  { id: "done", title: "Fertig", done: true },
];

const META_FIELDS = [
  { id: "m_company", label: "Unternehmen" },
  { id: "m_name", label: "Ansprechpartner" },
  { id: "m_position", label: "Position / Abteilung" },
  { id: "m_email", label: "E-Mail" },
];

function App() {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [meta, setMeta] = useState({});
  const [toast, setToast] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  const section = SECTIONS[step];
  const totalSteps = SECTIONS.length;
  const progress = Math.round((step / (totalSteps - 1)) * 100);

  useEffect(() => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, [step]);

  const set = (id, val) => setAnswers(p => ({ ...p, [id]: val }));
  const setM = (id, val) => setMeta(p => ({ ...p, [id]: val }));
  const toggleMulti = (id, opt) => {
    const cur = answers[id] || [];
    set(id, cur.includes(opt) ? cur.filter(o => o !== opt) : [...cur, opt]);
  };
  const setRating = (qId, item, val) => set(qId, { ...(answers[qId] || {}), [item]: val });

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2500); };

  const buildPayload = () => {
    const payload = { meta: {}, sections: {}, submittedAt: new Date().toISOString() };
    META_FIELDS.forEach(f => { payload.meta[f.label] = meta[f.id] || ""; });
    SECTIONS.forEach(sec => {
      if (!sec.questions) return;
      const sData = {};
      sec.questions.forEach(q => {
        const a = answers[q.id];
        if (q.type === "rating") sData[q.label] = a || {};
        else if (q.type === "multi") sData[q.label] = a || [];
        else sData[q.label] = a || "";
      });
      payload.sections[sec.title] = sData;
    });
    return payload;
  };

  const buildText = () => {
    let out = "══════════════════════════════════════\n";
    out += "  AUTOMATISIERUNGS-POTENZIALANALYSE\n";
    out += "══════════════════════════════════════\n\n";
    out += "── Kontaktdaten ──\n";
    META_FIELDS.forEach(f => { out += `${f.label}: ${meta[f.id] || "—"}\n`; });
    out += `Datum: ${new Date().toLocaleDateString("de-DE")}\n\n`;
    SECTIONS.forEach(sec => {
      if (!sec.questions) return;
      out += `── ${sec.icon} ${sec.title} ──\n\n`;
      sec.questions.forEach(q => {
        out += `▸ ${q.label}\n`;
        const a = answers[q.id];
        if (q.type === "rating" && a) {
          q.items.forEach(item => { out += `  ${item}: ${a[item] || "—"}/5\n`; });
        } else if (q.type === "multi" && Array.isArray(a)) {
          out += `  ${a.length > 0 ? a.join(", ") : "—"}\n`;
        } else { out += `  ${a || "—"}\n`; }
        out += "\n";
      });
    });
    return out;
  };

  const handleSubmit = async () => {
    if (submitting) return;
    setSubmitting(true);
    
    // Try webhook first
    if (CONFIG.webhookUrl) {
      try {
        const res = await fetch(CONFIG.webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(buildPayload()),
        });
        if (res.ok) {
          setSubmitted(true);
          setSubmitting(false);
          showToast("✓ Erfolgreich übermittelt!");
          return;
        }
      } catch (e) {
        console.warn("Webhook failed, falling back", e);
      }
    }
    
    // Fallback: copy + email
    try { await navigator.clipboard.writeText(buildText()); } catch(e) {}
    const subject = encodeURIComponent(`Potenzialanalyse — ${meta.m_company || "Neuer Kunde"}`);
    const body = encodeURIComponent("Antworten sind in der Zwischenablage — bitte hier einfügen oder als Anhang senden.\n\n(Falls die Zwischenablage nicht funktioniert hat, finden Sie die Antworten auch als Text am Ende der Seite.)");
    window.location.href = `mailto:${CONFIG.fallbackEmail}?subject=${subject}&body=${body}`;
    setSubmitted(true);
    setSubmitting(false);
    showToast("✓ Kopiert! E-Mail wird geöffnet.");
  };

  const answeredCount = (sec) => {
    if (!sec.questions) return 0;
    return sec.questions.filter(q => {
      const a = answers[q.id];
      if (q.type === "rating") return a && Object.keys(a).length > 0;
      if (q.type === "multi") return Array.isArray(a) && a.length > 0;
      return a && String(a).length > 0;
    }).length;
  };

  return (
    <React.Fragment>
      {/* Progress */}
      <div className="progress-bar">
        <div className="progress-inner">
          <span className="progress-label">{String(step).padStart(2,"0")}/{String(totalSteps-1).padStart(2,"0")}</span>
          <div className="progress-track"><div className="progress-fill" style={{width:`${progress}%`}} /></div>
          <span className="progress-label">{progress}%</span>
        </div>
      </div>

      <div className="container">
        {/* ── INTRO ── */}
        {section.intro && (
          <div style={{textAlign:"center",paddingTop:60}}>
            <div style={{fontSize:13,fontFamily:"var(--mono)",color:"var(--accent)",letterSpacing:3,textTransform:"uppercase",marginBottom:24}}>Fragebogen</div>
            <h1 style={{fontSize:38,fontWeight:700,lineHeight:1.2,marginBottom:16,background:"linear-gradient(135deg, #e8ecf4 0%, #a78bfa 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
              Automatisierungs-Potenzialanalyse
            </h1>
            <p style={{fontSize:17,color:"var(--text-muted)",maxWidth:540,margin:"0 auto 40px",lineHeight:1.6}}>
              Dieser Fragebogen hilft uns, Ihr Unternehmen zu verstehen und die größten Automatisierungspotenziale zu identifizieren. Ihre Antworten werden vertraulich behandelt.
            </p>
            <p style={{fontSize:14,color:"var(--text-dim)",marginBottom:40}}>⏱ ca. 30–45 Minuten</p>
            <div style={{textAlign:"left",maxWidth:440,margin:"0 auto 40px",display:"flex",flexDirection:"column",gap:14}}>
              {META_FIELDS.map(f => (
                <div key={f.id}>
                  <label style={{fontSize:12,fontWeight:500,color:"var(--text-muted)",display:"block",marginBottom:4}}>{f.label} *</label>
                  <input className="input-field" value={meta[f.id]||""} onChange={e=>setM(f.id,e.target.value)} placeholder={f.label} />
                </div>
              ))}
            </div>
            <button className="btn-primary" onClick={()=>setStep(1)}>Starten →</button>
          </div>
        )}

        {/* ── DONE ── */}
        {section.done && (
          <div style={{paddingTop:40}}>
            <div style={{textAlign:"center",marginBottom:40}}>
              <div style={{fontSize:48,marginBottom:16}}>{submitted ? "🎉" : "✅"}</div>
              <h1 style={{fontSize:32,fontWeight:700,marginBottom:12}}>
                {submitted ? "Vielen Dank!" : "Fast geschafft!"}
              </h1>
              <p style={{color:"var(--text-muted)",fontSize:16,maxWidth:480,margin:"0 auto"}}>
                {submitted 
                  ? "Ihre Antworten wurden übermittelt. Wir melden uns in Kürze bei Ihnen."
                  : "Prüfen Sie Ihre Antworten und senden Sie den Fragebogen ab."}
              </p>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:28}}>
              {SECTIONS.filter(s=>s.questions).map(s => (
                <button key={s.id} className="summary-card" onClick={()=>setStep(SECTIONS.indexOf(s))}>
                  <div style={{fontSize:14,fontWeight:600}}>{s.icon} {s.title}</div>
                  <div style={{fontSize:12,color:"var(--accent)",marginTop:4}}>{answeredCount(s)}/{s.questions.length} beantwortet</div>
                </button>
              ))}
            </div>

            {!submitted && (
              <button className="btn-primary" onClick={handleSubmit} disabled={submitting}
                style={{width:"100%",padding:"16px 0",fontSize:17,opacity:submitting?0.6:1}}>
                {submitting ? "Wird gesendet..." : "📨 Fragebogen absenden"}
              </button>
            )}

            {submitted && (
              <div style={{textAlign:"center",padding:"20px 0",color:"var(--success)",fontSize:15,fontWeight:600}}>
                ✓ Ihre Antworten wurden erfolgreich übermittelt
              </div>
            )}

            <button className="btn-secondary" onClick={()=>setStep(0)} style={{display:"block",margin:"16px auto 0"}}>
              ← Zurück zum Anfang
            </button>
          </div>
        )}

        {/* ── QUESTIONS ── */}
        {!section.intro && !section.done && section.questions && (
          <div>
            <div className="nav-pills">
              {SECTIONS.filter(s=>s.questions).map(s => {
                const idx = SECTIONS.indexOf(s);
                return <button key={s.id} className={`nav-pill ${idx===step?"active":""}`} onClick={()=>setStep(idx)}>{s.icon} {s.title}</button>;
              })}
            </div>

            <div style={{marginBottom:32}}>
              <div style={{fontSize:36,marginBottom:8}}>{section.icon}</div>
              <h2 style={{fontSize:28,fontWeight:700,marginBottom:8}}>{section.title}</h2>
              <p style={{color:"var(--text-muted)",fontSize:15}}>{section.description}</p>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:28}}>
              {section.questions.map(q => (
                <div key={q.id} className="question-card">
                  <div className="question-label">{q.label}</div>
                  {q.hint && <div className="question-hint">{q.hint}</div>}

                  {q.type === "text" && (
                    <input className="input-field" value={answers[q.id]||""} onChange={e=>set(q.id,e.target.value)} />
                  )}

                  {q.type === "textarea" && (
                    <textarea className="input-field" value={answers[q.id]||""} onChange={e=>set(q.id,e.target.value)} rows={4} />
                  )}

                  {q.type === "select" && (
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {q.options.map(opt => (
                        <button key={opt} className={`select-option ${answers[q.id]===opt?"selected":""}`} onClick={()=>set(q.id,opt)}>
                          <span className="radio-dot"><span className="radio-dot-inner"/></span>{opt}
                        </button>
                      ))}
                    </div>
                  )}

                  {q.type === "multi" && (
                    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                      {q.options.map(opt => (
                        <button key={opt} className={`multi-tag ${(answers[q.id]||[]).includes(opt)?"selected":""}`} onClick={()=>toggleMulti(q.id,opt)}>
                          {(answers[q.id]||[]).includes(opt)?"✓ ":""}{opt}
                        </button>
                      ))}
                    </div>
                  )}

                  {q.type === "rating" && (
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      <div className="rating-grid" style={{marginBottom:4}}>
                        <span style={{fontSize:11,color:"var(--text-dim)"}}></span>
                        {[1,2,3,4,5].map(n=><span key={n} style={{fontSize:11,color:"var(--text-dim)",textAlign:"center"}}>{n}</span>)}
                        <span style={{fontSize:10,color:"var(--text-dim)",textAlign:"center"}}>N/A</span>
                      </div>
                      {q.items.map(item => {
                        const val = (answers[q.id]||{})[item];
                        return (
                          <div key={item} className="rating-grid">
                            <span className="rating-label" style={{fontSize:13,color:"#c0c8d8"}}>{item}</span>
                            {[1,2,3,4,5].map(n=>(
                              <button key={n} className={`rating-btn s${n} ${val===n?"selected":""}`} onClick={()=>setRating(q.id,item,n)}>{n}</button>
                            ))}
                            <button className={`rating-btn ${val==="N/A"?"selected":""}`} onClick={()=>setRating(q.id,item,"N/A")} style={{fontSize:10}}>—</button>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </div>

            <div style={{display:"flex",justifyContent:"space-between",marginTop:40,gap:16}}>
              <button className="btn-secondary" onClick={()=>setStep(Math.max(0,step-1))}>← Zurück</button>
              <button className="btn-primary" style={{padding:"12px 36px"}} onClick={()=>setStep(Math.min(totalSteps-1,step+1))}>
                {step===totalSteps-2 ? "Abschließen ✓" : "Weiter →"}
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Toast */}
      <div className={`toast ${toast?"show":""}`}>{toast}</div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
